name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Run tests (if any exist)
        run: |
          TEST_FILES=$(find tests/ -name "test_*.py" 2>/dev/null | head -1)
          if [ -n "$TEST_FILES" ]; then
            pytest tests/ -x -v --ignore=tests/eval_dataset.py --ignore=tests/eval_hard.py --ignore=tests/eval_urls.py --ignore=tests/eval_diagnose.py --ignore=tests/bench_realistic.py --ignore=tests/bench_engines.py --ignore=tests/load_test.py -k "not slow"
          else
            echo "No test files found (test_*.py). Skipping."
          fi
        env:
          SLOPTOTAL_PROFILE: lite

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
