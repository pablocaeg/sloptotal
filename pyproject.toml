[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E402",   # module-import-not-at-top — intentional in main.py (autoconfig before torch)
    "E501",   # line-too-long — existing codebase style
    "E741",   # ambiguous-variable-name — false positive on common names like 'l'
]

[tool.ruff.lint.per-file-ignores]
"app/engines/*.py" = ["F401"]  # engines import models lazily

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
